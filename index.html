<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#071926" />
  <title>The Thousand Year Tank</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="game-shell">
    <section class="resource-bar" id="resourceBar"></section>
    <header class="title-card">
      <p class="eyebrow">A seaside idle cult simulator</p>
      <h1>The Thousand Year Tank</h1>
    </header>
    <section class="visual-card">
      <canvas id="tankCanvas" width="480" height="300" aria-label="Animated pixel art lobster tank"></canvas>
      <div id="floatLayer" class="float-layer"></div>
    </section>
    <section class="status-card" id="statusCard"></section>
    <nav class="tab-bar" id="tabBar" aria-label="Game tabs"></nav>
    <section class="panel-card" id="panel"></section>
    <section class="log-card">
      <div class="log-title">Cellar Log</div>
      <div id="logList"></div>
    </section>
  </main>
  <div id="toastHost" class="toast-host"></div>
  <div id="modalHost" class="modal-host hidden"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
